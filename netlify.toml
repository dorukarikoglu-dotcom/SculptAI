[build]
  functions = "netlify/functions"

[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200

[[redirects]]
  from = "/api/admin-analytics"
  to = "/.netlify/functions/admin-analytics"
  status = 200

[[redirects]]
  from = "/api/v1/*"
  to = "/.netlify/functions/api-v1/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
